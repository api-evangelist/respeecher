    - GET    https://gateway.respeecher.com/api/v2/narration-styles/samples
    - POST   https://gateway.respeecher.com/api/v2/orders
    - POST   https://gateway.respeecher.com/api/v2/orders/retry/{recording_id}
    - POST   https://gateway.respeecher.com/api/recordings/conversion-order
    - POST   https://gateway.respeecher.com/api/recordings/conversion-redo/{recording_id}
    - POST   https://gateway.respeecher.com/api/v2/recordings/tts
    - POST   https://gateway.respeecher.com/api/recordings/tts
    - GET    https://gateway.respeecher.com/api/tts-voices
    - POST   https://gateway.respeecher.com/api/calibration
    - POST   https://gateway.respeecher.com/api/calibration/auto
    - PUT    https://gateway.respeecher.com/api/calibration/{calibration_id}/enable
    - GET    https://gateway.respeecher.com/api/recordings
    - POST   https://gateway.respeecher.com/api/recordings
