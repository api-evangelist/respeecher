    - GET    wss://api.respeecher.com/v1/public/tts/ua-rt/tts/websocket
sources:
  - url: https://gateway.respeecher.com/api/openapi.json
    type: OpenAPI
    note: Downloadable OpenAPI 3.0.2 for the Voice Marketplace API (title "Voice Marketplace API 0.6.0"), 38 paths.
  - url: https://docs.respeecher.com/
    type: Documentation
    note: Voice Marketplace API docs; api-key auth, keys at marketplace.respeecher.com/account.
  - url: https://docs.respeecher.com/endpoints-reference/
    type: APIReference
    note: Full endpoints reference by category (voices, orders, calibration, recordings, projects, credits, stats).
  - url: https://space.respeecher.com/docs/quickstart
    type: Documentation
    note: Respeecher Space real-time TTS quickstart; base https://api.respeecher.com/v1/public/tts/en-rt, X-API-Key.
  - url: https://space.respeecher.com/docs/api/tts/web-socket
    type: APIReference
    note: WebSocket endpoint wss://api.respeecher.com/v1/public/tts/{en-rt,ua-rt}; documented public WebSocket surface.
  - url: https://space.respeecher.com/docs/api/tts/sse
    type: APIReference
    note: POST /tts/sse HTTP Server-Sent Events streaming (one-way, not WebSocket).
  - url: https://space.respeecher.com/docs/api/tts/bytes
    type: APIReference
    note: POST /tts/bytes one-shot synthesis, up to ~5,000 characters, 120s timeout.
  - url: https://space.respeecher.com/docs/limits
    type: Documentation
    note: 5 concurrent generations/account; 100 MB bytes response; 12h WebSocket connection lifetime.
  - url: https://www.respeecher.com/real-time-tts-api
    type: ProductPage
    note: Real-time TTS marketing page; streaming under 200ms; WebSocket + SSE.
actions:
  asyncapiPath: asyncapi/respeecher-asyncapi.yml
  apisYmlUpdated: true
  reason: |
    A documented public WebSocket surface exists (Space real-time TTS), so the
    answer is true. An AsyncAPI 2.6 document was authored for the bidirectional
    WebSocket TTS channel, with the WebSocket transport (wss) documented
    explicitly and the SSE/bytes transports left in the REST OpenAPI so SSE is
    never misrepresented as WebSocket. All endpoints are sourced from
    Respeecher's own published OpenAPI and API reference; none were fabricated.
