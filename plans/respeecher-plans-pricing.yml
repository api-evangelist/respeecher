aid: respeecher
name: Respeecher Plans and Pricing
description: >-
  Respeecher pricing spans the self-service Voice Marketplace (credits and
  subscriptions, API and Pro Tools plugin access included), the Space real-time
  text-to-speech API (pay-as-you-go), and bespoke enterprise engagements through
  the AI Voice Lab. Figures below are captured from public pricing pages as of
  2026-07-11 and may change; confirm current pricing with Respeecher.
source:
- url: https://www.respeecher.com/marketplace/pricing
  type: Pricing
- url: https://www.respeecher.com/api
  type: Pricing
- url: https://www.respeecher.com/real-time-tts-api
  type: Pricing
currency: USD
access: Self-service for Marketplace and Space APIs (create an API key and pay as you go); enterprise is contact-sales.
plans:
- name: Marketplace Pay-As-You-Go
  type: prepaid-credits
  description: >-
    Prepaid credit packs; one credit is roughly 4,000 TTS characters or one
    minute of STS. API and Pro Tools plugin access included. Larger packs
    carry volume discounts.
  packs:
  - name: Starter Pack
    credits: 5
    tts_characters: 20000
    sts_minutes: 5
    price: 5
  - name: Best for Podcast
    credits: 16
    tts_characters: 60000
    sts_minutes: 16
    price: 15
    discount: 5% off
  - name: Most Popular
    credits: 30
    tts_characters: 120000
    sts_minutes: 30
    price: 27
    discount: 10% off
  - name: Save 30
    credits: 100
    tts_characters: 400000
    sts_minutes: 100
    price: 70
    discount: 30% off
  - name: Save 50
    credits: 500
    tts_characters: 2000000
    sts_minutes: 500
    price: 250
    discount: 50% off
- name: TTS Only
  type: subscription
  billing: monthly
  price_per_month: 9
  notes: First month 50% off. 25+ voices, 10+ accents, 350 daily requests, API access.
- name: Creator
  type: subscription
  billing: monthly
  price_per_month: 74
  included_tts_characters: 400000
  included_sts_minutes: 90
  notes: >-
    Most popular subscription. First month 50% off. 25+ voices, 10+ accents,
    100 daily requests, API access, commercial rights.
- name: Power
  type: subscription
  billing: monthly
  price_per_month: 414
  included_tts_characters: 3000000
  included_sts_minutes: 900
  notes: >-
    First month 50% off. 40+ voices, 20+ accents, 500 daily requests, API
    access, commercial rights, dedicated sound engineer.
- name: Space Real-Time TTS Pay-As-You-Go
  type: usage-based
  price: 2
  unit: per hour of audio
  notes: >-
    Real-time TTS API billed pay-as-you-go at about $2/hour (~$2 per 60,000
    characters), no subscription, cancel anytime; custom pricing for high volume.
- name: Enterprise / AI Voice Lab
  type: contact-sales
  notes: >-
    Custom pricing with volume discounts, unlimited concurrency, custom SSO,
    dedicated sound engineer support. The AI Voice Lab is a white-glove,
    per-project custom voice-cloning service for studios and enterprises.
notes: >-
  Yearly subscription billing saves ~17%. No permanent free tier; a free trial
  is available for testing. Voice talent receives at least 25% of revenue
  generated by their voices.
